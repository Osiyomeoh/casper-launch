name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_NFT_HASH: ${{ secrets.NEXT_PUBLIC_NFT_HASH }}
          NEXT_PUBLIC_YIELD_HASH: ${{ secrets.NEXT_PUBLIC_YIELD_HASH }}
          NEXT_PUBLIC_ESCROW_HASH: ${{ secrets.NEXT_PUBLIC_ESCROW_HASH }}
          NEXT_PUBLIC_GOV_HASH: ${{ secrets.NEXT_PUBLIC_GOV_HASH }}
          NEXT_PUBLIC_AGENT_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_AGENT_PUBLIC_KEY }}
